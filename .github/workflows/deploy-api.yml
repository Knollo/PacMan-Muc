name: Deploy API via SSH

on:
  push:
    branches: [main]
    paths: ['api/**']
  workflow_dispatch:

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject database credentials
        run: |
          sed -i "s/%%MYSQL_DB%%/${{ secrets.MySQL_DB }}/g" api/leaderboard.php
          sed -i "s/%%MYSQL_PW%%/${{ secrets.MySQL_PW }}/g" api/leaderboard.php

      - name: Setup SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          echo "Key file info:"
          head -1 ~/.ssh/deploy_key
          wc -l ~/.ssh/deploy_key
          ssh-keygen -l -f ~/.ssh/deploy_key 2>&1 || echo "⚠️ Key validation failed"

      - name: Deploy API via SCP
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_DEPLOY_PATH: ${{ secrets.SSH_DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "$SSH_USER@$SSH_HOST" "mkdir -p $SSH_DEPLOY_PATH/api"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            api/leaderboard.php "$SSH_USER@$SSH_HOST:$SSH_DEPLOY_PATH/api/"
          echo "✅ API deployed successfully (with credentials injected)"
