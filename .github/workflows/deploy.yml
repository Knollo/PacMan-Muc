name: Deploy Website via SSH

on:
  push:
    branches: [main]
    paths-ignore: ['api/**']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          echo "Key file info:"
          head -1 ~/.ssh/deploy_key
          wc -l ~/.ssh/deploy_key
          ssh-keygen -l -f ~/.ssh/deploy_key 2>&1 || echo "⚠️ Key validation failed"

      - name: Deploy Website via SCP
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_DEPLOY_PATH: ${{ secrets.SSH_DEPLOY_PATH }}
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            index.html test.html tutorial.html waypoints.js \
            "$SSH_USER@$SSH_HOST:$SSH_DEPLOY_PATH/"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            -r Images \
            "$SSH_USER@$SSH_HOST:$SSH_DEPLOY_PATH/"
          echo "✅ Website deployed successfully"
